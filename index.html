<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="家樂美房產管理" />
  <title>家樂美房產管理顧問有限公司</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f9fafb; }
    #root { min-height: 100vh; }
    input, select, textarea, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }
    #loading-screen {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #f0f4ff 0%, #fafafa 60%, #fff7ed 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 9999;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 24px; height: 24px; border-radius: 50%; border: 3px solid #e5e7eb; border-top-color: #1d4ed8; animation: spin 0.8s linear infinite; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <p style="font-size:16px;font-weight:700;color:#1d4ed8;">家樂美房產管理顧問有限公司</p>
    <div class="spinner"></div>
    <p style="color:#9ca3af;font-size:13px;">載入中，請稍候...</p>
  </div>
  <div id="root"></div>
  <script>
    window.storage = {
      get: function(key) {
        var v = localStorage.getItem(key);
        if (v === null) return Promise.reject(new Error("Key not found: " + key));
        return Promise.resolve({ key: key, value: v });
      },
      set: function(key, value) {
        try { localStorage.setItem(key, value); } catch(e) {}
        return Promise.resolve({ key: key, value: value });
      },
      remove: function(key) {
        try { localStorage.removeItem(key); } catch(e) {}
        return Promise.resolve({ key: key, deleted: true });
      }
    };
  </script>
  <script type="text/babel" src="app.jsx" data-presets="react"></script>
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var ls = document.getElementById('loading-screen');
        if (ls) ls.style.display = 'none';
      }, 4000);
    });
  </script>
</body>
</html>
